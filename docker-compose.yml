version: '3.9'

services:
  # Node.js API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-video-editor-api
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      
      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ai_video_editor
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      
      # Redis
      REDIS_URL: redis://redis:6379
      
      # JWT
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      
      # AWS
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-ai-video-editor}
      
      # APIs
      DESCRIPT_API_KEY: ${DESCRIPT_API_KEY}
      ASSEMBLYAI_API_KEY: ${ASSEMBLYAI_API_KEY}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      GOOGLE_CLOUD_PROJECT_ID: ${GOOGLE_CLOUD_PROJECT_ID}
      TOPAZ_API_KEY: ${TOPAZ_API_KEY}
      RUNWAY_API_KEY: ${RUNWAY_API_KEY}
      IZOTOPE_API_KEY: ${IZOTOPE_API_KEY}
    
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    
    networks:
      - ai-video-editor
    
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ai-video-editor-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ai_video_editor
    
    ports:
      - "5432:5432"
    
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/config/init.sql:/docker-entrypoint-initdb.d/init.sql
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    
    networks:
      - ai-video-editor
    
    restart: unless-stopped

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: ai-video-editor-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    
    ports:
      - "6379:6379"
    
    volumes:
      - redis_data:/data
    
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    
    networks:
      - ai-video-editor
    
    restart: unless-stopped

  # Job Queue Worker (optional - separate worker instance)
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-video-editor-worker
    environment:
      NODE_ENV: production
      WORKER_MODE: true
      
      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ai_video_editor
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      
      # Redis
      REDIS_URL: redis://redis:6379
      
      # APIs
      DESCRIPT_API_KEY: ${DESCRIPT_API_KEY}
      ASSEMBLYAI_API_KEY: ${ASSEMBLYAI_API_KEY}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-ai-video-editor}
    
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    
    networks:
      - ai-video-editor
    
    restart: unless-stopped
    
    # Run worker process
    command: node src/processors/queueWorker.js

  # PgAdmin for database management (optional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ai-video-editor-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    
    ports:
      - "5050:80"
    
    networks:
      - ai-video-editor
    
    restart: unless-stopped
    
    profiles:
      - debug

  # Nginx Reverse Proxy (optional)
  nginx:
    image: nginx:alpine
    container_name: ai-video-editor-nginx
    ports:
      - "80:80"
      - "443:443"
    
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    
    depends_on:
      - api
    
    networks:
      - ai-video-editor
    
    restart: unless-stopped
    
    profiles:
      - production

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  ai-video-editor:
    driver: bridge

# Usage:
# Development: docker-compose up -d
# With debugging: docker-compose --profile debug up -d
# Production: docker-compose --profile production up -d
# Stop: docker-compose down
# View logs: docker-compose logs -f api
